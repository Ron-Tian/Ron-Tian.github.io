name = "stock-watchlist-sync"
main = "worker.js"
compatibility_date = "2024-01-01"

# KV 命名空间绑定（部署后自动创建）
[[kv_namespaces]]
binding = "WATCHLIST"
id = ""  # 部署后填入实际 ID

# 环境变量（部署后通过 dashboard 或 wrangler secret 设置）
# API_KEY: 一个随机字符串，前端和 Worker 共享的密钥
# BLOG_ORIGIN: 允许的来源域名
[vars]
BLOG_ORIGIN = "https://ron-tian.github.io"
